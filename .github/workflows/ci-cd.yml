name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install flask==3.0.3 pytest

      - name: Run tests
        run: |
          cd app
          python3 -m pytest tests/test_app.py -v

  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/flask-devops-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/flask-devops-api:${{ github.sha }}

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/devops-project-key.pem
          chmod 400 ~/.ssh/devops-project-key.pem
          ssh-keyscan -H ${{ secrets.EC2_MASTER_IP }} >> ~/.ssh/known_hosts

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl

      - name: Get kubeconfig from master
        run: |
          mkdir -p ~/.kube
          scp -i ~/.ssh/devops-project-key.pem ubuntu@${{ secrets.EC2_MASTER_IP }}:/etc/rancher/k3s/k3s.yaml ~/.kube/config
          sed -i 's/127.0.0.1/${{ secrets.EC2_MASTER_IP }}/g' ~/.kube/config

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl rollout restart deployment/flask-api -n devops-project
          kubectl rollout status deployment/flask-api -n devops-project --timeout=120s

      - name: Verify deployment
        run: |
          kubectl get pods -n devops-project
          kubectl get service -n devops-project
