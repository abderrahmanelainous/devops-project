---
- name: Install K3s on master node
  shell: |
    curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="server --disable traefik --write-kubeconfig-mode 644" sh -
  become: yes
  when: inventory_hostname in groups['master']
  args:
    creates: /usr/local/bin/k3s

- name: Wait for K3s to be ready on master
  wait_for:
    path: /var/lib/rancher/k3s/server/node-token
    state: present
    timeout: 120
  become: yes
  when: inventory_hostname in groups['master']

- name: Get K3s join token from master
  slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_token
  become: yes
  when: inventory_hostname in groups['master']

- name: Store token as fact
  set_fact:
    k3s_node_token: "{{ k3s_token.content | b64decode | trim }}"
  when: inventory_hostname in groups['master']

- name: Install K3s agent on worker node
  shell: |
    curl -sfL https://get.k3s.io | K3S_URL=https://10.0.1.178:6443 K3S_TOKEN="{{ hostvars[groups['master'][0]]['k3s_node_token'] }}" sh -
  become: yes
  when: inventory_hostname in groups['worker']
  args:
    creates: /usr/local/bin/k3s

- name: Wait for worker to join cluster
  pause:
    seconds: 30
  when: inventory_hostname in groups['worker']

- name: Get kubeconfig from master
  fetch:
    src: /etc/rancher/k3s/k3s.yaml
    dest: /mnt/c/Users/user/devops-project/k3s.yaml
    flat: yes
  become: yes
  when: inventory_hostname in groups['master']
