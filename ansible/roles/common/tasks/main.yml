---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  become: yes

- name: Upgrade all packages
  apt:
    upgrade: dist
    autoremove: yes
  become: yes

- name: Install required system packages
  apt:
    name:
      - curl
      - wget
      - git
      - apt-transport-https
      - ca-certificates
      - gnupg
      - lsb-release
      - python3
      - python3-pip
    state: present
  become: yes

- name: Check if swap file already exists
  stat:
    path: /swapfile
  register: swap_file

- name: Create 2GB swap file
  command: fallocate -l 2G /swapfile
  become: yes
  when: not swap_file.stat.exists

- name: Set swap file permissions
  file:
    path: /swapfile
    owner: root
    group: root
    mode: '0600'
  become: yes
  when: not swap_file.stat.exists

- name: Format swap file
  command: mkswap /swapfile
  become: yes
  when: not swap_file.stat.exists

- name: Enable swap file
  command: swapon /swapfile
  become: yes
  when: not swap_file.stat.exists

- name: Make swap permanent on reboot
  lineinfile:
    path: /etc/fstab
    line: '/swapfile none swap sw 0 0'
    state: present
  become: yes

- name: Set swappiness to 10
  sysctl:
    name: vm.swappiness
    value: '10'
    state: present
    reload: yes
  become: yes
